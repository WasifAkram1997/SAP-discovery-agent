apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sap-discovery
  labels:
    app: postgres
spec:
  serviceName: postgres-service  # Must match the headless service name
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432

          # Postgres requires these environment variables to initialize
          env:
            - name: POSTGRES_DB
              value: "sap_discovery"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sap-secrets
                  key: DB_PASSWORD

          # Mount the persistent storage
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data  # Where Postgres stores its data

          # Resource limits
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Readiness probe - checks if Postgres is ready to accept connections
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          # Liveness probe - restarts pod if Postgres becomes unresponsive
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

      # Reference the PVC we created
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc  # Must match PVC name