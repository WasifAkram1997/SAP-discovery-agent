apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sap-discovery
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: sap-frontend:v1.0
          imagePullPolicy: Never
          env:
            - name: VITE_API_URL
              value: ""  # Empty string = same-origin, requests go to /api via ingress
          ports:
            - containerPort: 3000

          # Resource limits - prevents this pod from starving others
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Readiness probe - Kubernetes won't send traffic until this passes
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # Liveness probe - Kubernetes restarts pod if this fails
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3