apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: sap-discovery
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend           # Must match the Deployment name

  minReplicas: 1             # Never scale below 1 pod
  maxReplicas: 3             # Frontend needs less scaling than backend

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up when CPU exceeds 70%