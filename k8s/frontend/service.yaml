apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: sap-discovery
  labels:
    app: frontend
spec:
  type: ClusterIP        # NodePort exposes the service on minikube's IP
  selector:
    app: frontend        # Routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80           # Service port (internal)
      targetPort: 3000   # Container port