apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: sap-discovery
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend            # Must match the Deployment name

  minReplicas: 1             # Never scale below 1 pod
  maxReplicas: 5             # Never scale above 5 pods

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up when CPU exceeds 70%

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up when memory exceeds 80%